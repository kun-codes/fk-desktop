name: Release new version

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  checks: write

jobs:
  call-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, ubuntu-24.04-arm, ubuntu-22.04-arm]
        compiler: [nuitka, pyinstaller]
    uses: ./.github/workflows/build.yml
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      tag: ${{ github.ref_name }}
    secrets: inherit