name: Manual build - one

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Operating system'
        required: true
        default: 'ubuntu-24.04'
        type: choice
        options:
          - ubuntu-24.04
          - ubuntu-22.04
          - ubuntu-24.04-arm
          - ubuntu-22.04-arm
      compiler:
        description: 'Compiler'
        required: true
        default: 'nuitka'
        type: choice
        options:
          - nuitka
          - pyinstaller

jobs:
  call-build:
    uses: ./.github/workflows/build.yml
    with:
      os: ${{ inputs.os }}
      compiler: ${{ inputs.compiler }}
    secrets: inherit